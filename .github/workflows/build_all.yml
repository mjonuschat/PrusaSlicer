name: Build all

on:
  push:
    # branches:
    #  - boss
    #  - release/*
    paths:
     - 'deps/**'
     - 'src/**'
     - '**/CMakeLists.txt'
     - 'version.inc'
     - 'resources/**'
     - ".github/workflows/*.yml"
     - "build_release_linux.sh"
     - "build_release_macos.sh"
     - "build_win.bat"

  pull_request:
    branches:
     - boss
     - release/*
    paths:
     - 'deps/**'
     - 'src/**'
     - '**/CMakeLists.txt'
     - 'version.inc'
     - ".github/workflows/*.yml"

  workflow_dispatch: # allows for manual dispatch
    inputs:
      build-deps-only:
        description: 'Only build dependencies (bypasses caching)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  build_flatpak:
    name: Build PrusaSlicer+BOSS (Flatpak)
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    env:
      date:
      ver:
      ver_pure:      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get the version and date on Ubuntu and macOS
        if: inputs.os != 'windows-latest'
        run: |
          ver_pure=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ver="PR-${{ github.event.number }}"
          else
            ver="$ver_pure+BOSS"
          fi
          echo "ver=$ver" >> $GITHUB_ENV
          echo "ver_pure=$ver_pure" >> $GITHUB_ENV
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_ENV
        shell: bash

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: PrusaSlicer.flatpak
          manifest-path: .flatpak/io.github.mjonuschat.PrusaSlicer.yml
          cache-key: flatpak-builder-${{ github.sha }}    
